<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suhoof — Record Test Data</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf6f0; color:#1a1612; font-family:'IBM Plex Sans Arabic',system-ui; min-height:100vh; display:flex; flex-direction:column; }

header { text-align:center; padding:1.2rem; border-bottom:1px solid #e8e0d4; background:#fff; }
header h1 { font-family:'Amiri',serif; font-size:1.6rem; color:#8b6914; }
header p { font-size:.75rem; color:#6b5e52; direction:ltr; }

.tabs { display:flex; gap:0; border-bottom:1px solid #e8e0d4; background:#fff; overflow-x:auto; }
.tab { flex:1; padding:.6rem .8rem; text-align:center; cursor:pointer; font-size:.85rem; color:#6b5e52; border:none; background:none; border-bottom:2px solid transparent; font-family:inherit; white-space:nowrap; }
.tab:hover { color:#8b6914; }
.tab.active { color:#8b6914; border-bottom-color:#8b6914; font-weight:600; }

main { flex:1; display:flex; flex-direction:column; align-items:center; padding:1.5rem 1rem; max-width:750px; margin:0 auto; width:100%; }

.passage { font-family:'Amiri',serif; font-size:clamp(1.3rem,3.5vw,1.8rem); line-height:2.4; text-align:justify; margin-bottom:1.5rem; white-space:pre-line; }

.controls { display:flex; flex-direction:column; align-items:center; gap:.6rem; width:100%; max-width:500px; }

.notes-row { width:100%; direction:ltr; }
.notes-row label { font-size:.75rem; color:#6b5e52; display:block; margin-bottom:.3rem; }
.notes-row input { width:100%; padding:.4rem .6rem; border:1px solid #e8e0d4; border-radius:6px; font-size:.8rem; font-family:inherit; }

.record-btn { width:64px; height:64px; border-radius:50%; border:3px solid #e8e0d4; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.record-btn:hover { border-color:#8b6914; }
.record-btn svg { width:24px; height:24px; fill:#6b5e52; }
.record-btn.recording { border-color:#d32f2f; background:#ffebee; animation:pulse 1.5s ease-in-out infinite; }
.record-btn.recording svg { fill:#d32f2f; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(211,47,47,.3)} 50%{box-shadow:0 0 0 12px rgba(211,47,47,0)} }

.hint { font-size:.7rem; color:#a89b8e; direction:ltr; }

.review { display:none; flex-direction:column; align-items:center; gap:.75rem; width:100%; max-width:500px; }
.review.visible { display:flex; }
.review audio { width:100%; }
.review-btns { display:flex; gap:.5rem; direction:ltr; }
.review-btns button { padding:.45rem 1.2rem; border-radius:6px; font-size:.8rem; font-family:inherit; cursor:pointer; border:none; }
.btn-save { background:#1b7a3d; color:#fff; }
.btn-save:hover { background:#15632f; }
.btn-discard { background:none; color:#6b5e52; border:1px solid #e8e0d4 !important; }
.btn-discard:hover { border-color:#b71c1c !important; color:#b71c1c; }

.saved-toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:#1b7a3d; color:#fff; padding:.5rem 1.2rem; border-radius:8px; font-size:.8rem; direction:ltr; opacity:0; transition:opacity .3s; pointer-events:none; }
.saved-toast.show { opacity:1; }

.counter { position:fixed; top:.5rem; right:.5rem; background:#fff; border:1px solid #e8e0d4; border-radius:6px; padding:.2rem .5rem; font-size:.7rem; color:#6b5e52; direction:ltr; }
</style>
</head>
<body>

<header>
  <h1>سُحُوف</h1>
  <p>Test Data Recorder</p>
</header>

<div class="tabs" id="tabs"></div>

<main>
  <div class="passage" id="passage"></div>

  <div class="controls">
    <div class="notes-row">
      <label>Notes (describe what you read & any intentional mistakes):</label>
      <input id="notes" placeholder='e.g. "read first paragraph correctly" or "said fatha on الحامدين instead of kasra"'>
    </div>

    <button class="record-btn" id="rec" onclick="toggle()">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <div class="hint" id="hint">Tap to record</div>

    <div class="review" id="review">
      <audio id="playback" controls></audio>
      <div class="review-btns">
        <button class="btn-save" onclick="confirmSave()">Save</button>
        <button class="btn-discard" onclick="discard()">Discard</button>
      </div>
    </div>
  </div>
</main>

<div class="saved-toast" id="toast">Saved!</div>
<div class="counter" id="rec-count"></div>

<script>
let passages=[], currentId=null, mr=null, chunks=[], recording=false, totalSaved=0;
let pendingBlob=null;

async function init() {
  const d = await (await fetch('/api/passages')).json();
  passages = d.passages;
  try {
    const r = await (await fetch('/api/recordings')).json();
    totalSaved = r.recordings.length;
  } catch(e) {}
  buildTabs();
  selectPassage(passages[0].id);
}

function buildTabs() {
  const container = document.getElementById('tabs');
  passages.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.textContent = p.title;
    btn.dataset.id = p.id;
    btn.onclick = () => selectPassage(p.id);
    container.appendChild(btn);
  });
}

function selectPassage(id) {
  currentId = id;
  const p = passages.find(x => x.id === id);
  document.getElementById('passage').textContent = p.text;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  document.getElementById('notes').value = '';
  document.getElementById('rec-count').textContent = `${totalSaved} saved`;
  hideReview();
}

async function toggle() {
  if(recording) stop(); else start();
}

async function start() {
  hideReview();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  mr = new MediaRecorder(stream, {
    mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
  });
  chunks=[];
  mr.ondataavailable = e => chunks.push(e.data);
  mr.onstop = () => {
    stream.getTracks().forEach(t=>t.stop());
    pendingBlob = new Blob(chunks, {type:'audio/webm'});
    showReview(pendingBlob);
  };
  mr.start();
  recording=true;
  document.getElementById('rec').classList.add('recording');
  document.getElementById('hint').textContent='Tap to stop';
}

function stop() {
  if(mr&&mr.state==='recording') mr.stop();
  recording=false;
  document.getElementById('rec').classList.remove('recording');
  document.getElementById('hint').textContent='';
}

function showReview(blob) {
  const audio = document.getElementById('playback');
  audio.src = URL.createObjectURL(blob);
  document.getElementById('review').classList.add('visible');
  document.getElementById('rec').style.display='none';
  document.getElementById('hint').textContent='Listen back, then save or discard';
}

function hideReview() {
  document.getElementById('review').classList.remove('visible');
  document.getElementById('rec').style.display='flex';
  const audio = document.getElementById('playback');
  audio.pause();
  if(audio.src) URL.revokeObjectURL(audio.src);
  audio.src='';
  pendingBlob=null;
}

async function confirmSave() {
  if(!pendingBlob) return;
  const fd = new FormData();
  fd.append('audio', pendingBlob, 'rec.webm');
  fd.append('passage_id', currentId);
  fd.append('notes', document.getElementById('notes').value);
  await fetch('/api/save',{method:'POST',body:fd});
  totalSaved++;
  document.getElementById('rec-count').textContent = `${totalSaved} saved`;
  hideReview();
  document.getElementById('hint').textContent='Tap to record';

  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

function discard() {
  hideReview();
  document.getElementById('hint').textContent='Discarded — tap to record again';
}

init();
</script>
</body>
</html>
