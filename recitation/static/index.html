<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سُحُوف — Live Arabic Readalong</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf6f0; color:#1a1612; font-family:'IBM Plex Sans Arabic',system-ui; min-height:100vh; display:flex; flex-direction:column; }

header { text-align:center; padding:1rem; border-bottom:1px solid #e8e0d4; background:#fff; }
header h1 { font-family:'Amiri',serif; font-size:1.5rem; color:#8b6914; }
header p { font-size:.7rem; color:#a89b8e; direction:ltr; margin-top:.2rem; }

/* Passage tabs */
.tabs { display:flex; gap:0; border-bottom:1px solid #e8e0d4; background:#fff; overflow-x:auto; }
.tab { flex:1; padding:.5rem .6rem; text-align:center; cursor:pointer; font-size:.8rem; color:#6b5e52; border:none; background:none; border-bottom:2px solid transparent; font-family:inherit; white-space:nowrap; }
.tab:hover { color:#8b6914; }
.tab.active { color:#8b6914; border-bottom-color:#8b6914; font-weight:600; }

/* Main content */
main { flex:1; display:flex; flex-direction:column; align-items:center; padding:1.5rem 1rem 6rem; max-width:750px; margin:0 auto; width:100%; }

/* Summary banner */
.summary {
  display:none;
  width:100%;
  max-width:600px;
  padding:.6rem 1rem;
  border-radius:8px;
  font-size:.8rem;
  text-align:center;
  direction:ltr;
  margin-bottom:1rem;
}
.summary.good { display:block; background:#e8f5e9; color:#2e7d32; }
.summary.issues { display:block; background:#fff3e0; color:#e65100; }
.summary.bad { display:block; background:#ffebee; color:#c62828; }

/* Text display */
.text-area {
  font-family:'Amiri',serif;
  font-size:clamp(1.4rem,4vw,2rem);
  line-height:2.6;
  text-align:justify;
  width:100%;
}

/* Word styling */
.word {
  display:inline;
  padding:0 .1em;
  border-radius:4px;
  cursor:default;
  transition: background .3s, color .3s;
  position:relative;
}
.word.correct { background:#e8f5e9; }
.word.i3rab { background:#e3f2fd; color:#1565c0; text-decoration:underline; text-decoration-color:#90caf9; cursor:pointer; }
.word.tashkeel { background:#fff3e0; color:#e65100; text-decoration:underline; text-decoration-color:#ffcc80; cursor:pointer; }
.word.wrong { background:#ffebee; color:#c62828; text-decoration:line-through; text-decoration-color:#ef9a9a; cursor:pointer; }

/* Tooltip for errors */
.tooltip {
  display:none;
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:.4rem .6rem;
  border-radius:6px;
  font-size:.75rem;
  font-family:'IBM Plex Sans Arabic',system-ui;
  white-space:nowrap;
  z-index:100;
  direction:rtl;
}
.tooltip::after {
  content:'';
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:#333;
}
.word.active .tooltip { display:block; }

/* Bottom bar */
.bottom-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #e8e0d4;
  padding:.8rem;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:1rem;
  z-index:50;
}

.record-btn {
  width:56px; height:56px;
  border-radius:50%;
  border:3px solid #e8e0d4;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
  flex-shrink:0;
}
.record-btn:hover { border-color:#8b6914; }
.record-btn svg { width:22px; height:22px; fill:#6b5e52; }
.record-btn.recording { border-color:#d32f2f; background:#ffebee; animation:pulse 1.5s ease-in-out infinite; }
.record-btn.recording svg { fill:#d32f2f; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(211,47,47,.3)} 50%{box-shadow:0 0 0 10px rgba(211,47,47,0)} }

.status { font-size:.75rem; color:#6b5e52; text-align:center; min-width:120px; }
.status.scoring { color:#8b6914; }
.status.error { color:#c62828; }

/* Loading spinner */
.spinner {
  display:inline-block;
  width:16px; height:16px;
  border:2px solid #e8e0d4;
  border-top-color:#8b6914;
  border-radius:50%;
  animation:spin .6s linear infinite;
  vertical-align:middle;
  margin-left:.3rem;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>سُحُوف</h1>
  <p>Live Arabic Readalong</p>
</header>

<div class="tabs" id="tabs"></div>

<main>
  <div class="summary" id="summary"></div>
  <div class="text-area" id="textArea"></div>
</main>

<div class="bottom-bar">
  <div class="status" id="status">Tap to read aloud</div>
  <button class="record-btn" id="recBtn" onclick="toggleRecord()">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
</div>

<script>
let passages = [];
let currentPassage = null;
let allWords = [];
let phraseBreaks = new Set();
let isRecording = false;
let activeTooltipWord = null;

// Streaming state
let ws = null;
let audioCtx = null;
let micStream = null;
let workletNode = null;

// ── Init ──
async function init() {
  const d = await (await fetch('/api/passages')).json();
  passages = d.passages;
  buildTabs();
  selectPassage(passages[0].id);
}

function buildTabs() {
  const container = document.getElementById('tabs');
  passages.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.textContent = p.title;
    btn.dataset.id = p.id;
    btn.onclick = () => selectPassage(p.id);
    container.appendChild(btn);
  });
}

function selectPassage(id) {
  currentPassage = passages.find(x => x.id === id);
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.id === id));
  renderText();
}

// ── Render full text ──
function renderText() {
  const phrases = currentPassage.phrases || [currentPassage.text];
  allWords = [];
  phraseBreaks = new Set();
  phrases.forEach((ph, pi) => {
    if (pi > 0) phraseBreaks.add(allWords.length);
    ph.split(/\s+/).forEach(w => allWords.push(w));
  });

  const area = document.getElementById('textArea');
  area.innerHTML = '';
  allWords.forEach((w, i) => {
    if (phraseBreaks.has(i)) {
      area.appendChild(document.createElement('br'));
    }
    const span = document.createElement('span');
    span.className = 'word';
    span.dataset.idx = i;
    span.textContent = w;
    span.onclick = () => toggleTooltip(span);
    area.appendChild(span);
    if (i < allWords.length - 1 && !phraseBreaks.has(i + 1)) {
      area.appendChild(document.createTextNode(' '));
    }
  });

  const summary = document.getElementById('summary');
  summary.className = 'summary';
  summary.textContent = '';
  setStatus('Tap to read aloud');
}

// ── Recording with WebSocket streaming ──
async function toggleRecord() {
  if (isRecording) stopRecording();
  else startRecording();
}

async function startRecording() {
  clearHighlights();

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    setStatus('Microphone access denied', 'error');
    return;
  }

  // Try 16 kHz AudioContext (Chrome/Firefox). Safari may force hardware rate.
  try {
    audioCtx = new AudioContext({ sampleRate: 16000 });
  } catch (e) {
    audioCtx = new AudioContext();
  }
  const nativeRate = audioCtx.sampleRate;
  const source = audioCtx.createMediaStreamSource(micStream);

  // AudioWorklet that buffers ~1s of audio, resamples to 16kHz if needed
  const processorCode = `
    class PCMStreamer extends AudioWorkletProcessor {
      constructor(options) {
        super();
        this._ratio = (options.processorOptions && options.processorOptions.ratio) || 1;
        this._buf = [];
        this._count = 0;
        this._target = 16000; // output 1 second at 16 kHz
      }
      process(inputs) {
        const ch = inputs[0] && inputs[0][0];
        if (!ch) return true;
        this._buf.push(new Float32Array(ch));
        this._count += ch.length;
        // Check if we have ~1 second of native-rate audio
        const nativeSamplesNeeded = Math.round(this._target * this._ratio);
        if (this._count >= nativeSamplesNeeded) {
          const merged = new Float32Array(this._count);
          let off = 0;
          for (const b of this._buf) { merged.set(b, off); off += b.length; }
          let out = merged;
          if (this._ratio > 1.01) {
            // Simple linear-interpolation downsample
            const outLen = Math.round(this._count / this._ratio);
            out = new Float32Array(outLen);
            for (let i = 0; i < outLen; i++) {
              const src = i * this._ratio;
              const lo = Math.floor(src);
              const hi = Math.min(lo + 1, this._count - 1);
              const frac = src - lo;
              out[i] = merged[lo] * (1 - frac) + merged[hi] * frac;
            }
          }
          this.port.postMessage(out.buffer, [out.buffer]);
          this._buf = [];
          this._count = 0;
        }
        return true;
      }
    }
    registerProcessor('pcm-streamer', PCMStreamer);
  `;
  const blob = new Blob([processorCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);

  workletNode = new AudioWorkletNode(audioCtx, 'pcm-streamer', {
    processorOptions: { ratio: nativeRate / 16000 }
  });
  source.connect(workletNode);
  workletNode.connect(audioCtx.destination); // needed to keep the graph alive

  // Open WebSocket
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/score`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ passage_id: currentPassage.id }));
  };

  ws.onmessage = (evt) => {
    try {
      const result = JSON.parse(evt.data);
      if (result.error) {
        setStatus(result.error, 'error');
        return;
      }
      applyResults(result);
    } catch (e) {}
  };

  ws.onerror = () => setStatus('Connection error', 'error');
  ws.onclose = () => {};

  // Send PCM chunks from the worklet to the WebSocket
  workletNode.port.onmessage = (evt) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(evt.data); // ArrayBuffer of float32
    }
  };

  isRecording = true;
  document.getElementById('recBtn').classList.add('recording');
  setStatus('Reading...');
}

function stopRecording() {
  isRecording = false;
  document.getElementById('recBtn').classList.remove('recording');

  // Stop audio capture
  if (workletNode) { workletNode.disconnect(); workletNode = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }

  // Send "done" signal for final scoring, then close after response
  if (ws && ws.readyState === WebSocket.OPEN) {
    setStatus('<span class="spinner"></span> Final scoring...', 'scoring');
    ws.send('done');
    // onmessage will handle the final result; close after receiving it
    const origHandler = ws.onmessage;
    ws.onmessage = (evt) => {
      origHandler(evt);
      try {
        const data = JSON.parse(evt.data);
        if (data.final) {
          setStatus('Done — tap to read again');
          if (ws) { ws.close(); ws = null; }
        }
      } catch (e) {}
    };
    // Timeout: close anyway after 15s
    setTimeout(() => {
      if (ws) { ws.close(); ws = null; }
      setStatus('Done — tap to read again');
    }, 15000);
  } else {
    setStatus('Done — tap to read again');
  }
}

function clearHighlights() {
  document.querySelectorAll('.word').forEach(span => {
    span.classList.remove('correct', 'i3rab', 'tashkeel', 'wrong', 'active');
    const tip = span.querySelector('.tooltip');
    if (tip) tip.remove();
  });
  const summary = document.getElementById('summary');
  summary.className = 'summary';
  summary.textContent = '';
}

// ── Apply live results (incremental merge) ──
function applyResults(result) {
  const wordSpans = document.querySelectorAll('.word');

  // Build a Set of word indices in this update for quick lookup
  const updatedIndices = new Set(result.words.map(wr => wr.idx));

  let errorCount = 0, i3rabCount = 0, tashkeelCount = 0, scoredCount = 0;

  result.words.forEach(wr => {
    const span = wordSpans[wr.idx];
    if (!span) return;
    scoredCount++;

    // Clear previous state on this span only
    span.classList.remove('correct', 'i3rab', 'tashkeel', 'wrong');
    const oldTip = span.querySelector('.tooltip');
    if (oldTip) oldTip.remove();

    if (wr.status === 'correct') {
      span.classList.add('correct');
    } else if (wr.status === 'error') {
      if (wr.error_type === 'i3rab') {
        span.classList.add('i3rab');
        i3rabCount++;
      } else if (wr.error_type === 'tashkeel') {
        span.classList.add('tashkeel');
        tashkeelCount++;
      } else {
        span.classList.add('wrong');
      }
      errorCount++;

      const tip = document.createElement('div');
      tip.className = 'tooltip';
      tip.textContent = formatErrorDetail(wr);
      span.appendChild(tip);
    }
  });

  // Auto-scroll to last scored word
  if (result.words.length > 0) {
    const lastWr = result.words[result.words.length - 1];
    const lastSpan = wordSpans[lastWr.idx];
    if (lastSpan) {
      lastSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  // Update summary
  const summary = document.getElementById('summary');
  const correct = scoredCount - errorCount;
  if (errorCount === 0 && scoredCount > 0) {
    summary.className = 'summary good';
    summary.textContent = `${scoredCount} words — all correct`;
  } else if (errorCount > 0) {
    const parts = [];
    if (i3rabCount) parts.push(`${i3rabCount} i3rab`);
    if (tashkeelCount) parts.push(`${tashkeelCount} tashkeel`);
    summary.className = errorCount <= 2 ? 'summary issues' : 'summary bad';
    summary.textContent = `${correct}/${scoredCount} correct — ${parts.join(', ')} error${errorCount > 1 ? 's' : ''}`;
  }
}

function formatErrorDetail(wr) {
  if (!wr.error_detail) return 'Error detected';
  const detail = wr.error_detail;

  const i3rabNames = {
    'raf3': 'رفع (damma)',
    'nasb': 'نصب (fatha)',
    'jarr': 'جر (kasra)',
    'raf3_tanween': 'رفع + تنوين',
    'nasb_tanween': 'نصب + تنوين',
    'jarr_tanween': 'جر + تنوين',
  };

  if (wr.error_type === 'i3rab' && i3rabNames[detail]) {
    return `Detected: ${i3rabNames[detail]}`;
  }
  if (wr.error_type === 'tashkeel' && detail.startsWith('tashkeel_')) {
    const parts = detail.replace('tashkeel_', '').split('_on_');
    if (parts.length === 2) {
      return `Detected: ${parts[0]} on ${parts[1]}`;
    }
  }
  return detail;
}

// ── Tooltip ──
function toggleTooltip(span) {
  if (activeTooltipWord === span) {
    span.classList.remove('active');
    activeTooltipWord = null;
  } else {
    if (activeTooltipWord) activeTooltipWord.classList.remove('active');
    span.classList.add('active');
    activeTooltipWord = span;
  }
}

document.addEventListener('click', e => {
  if (activeTooltipWord && !activeTooltipWord.contains(e.target)) {
    activeTooltipWord.classList.remove('active');
    activeTooltipWord = null;
  }
});

// ── Status ──
function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.innerHTML = text;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

init();
</script>
</body>
</html>
