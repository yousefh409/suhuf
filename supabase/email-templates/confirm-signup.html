<!--
  Suhuf — "Confirm signup" email template.
  Paste this into Supabase: Auth → Email Templates → "Confirm signup" → Message body (HTML).
  Requires {{ .Token }} (the 6-digit code). Do NOT remove it.
  Pairs with the in-app code-entry flow (verifyOtp), so no confirmation link is included.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>Confirm your email</title>
  </head>
  <body style="margin:0; padding:0; background-color:#F5EEE4;">
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color:#F5EEE4; padding:40px 16px;"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="max-width:480px; background-color:#FFFDF9; border:1px solid rgba(180,125,58,0.18); border-radius:14px;"
          >
            <tr>
              <td style="padding:40px 40px 8px 40px;" align="center">
                <div
                  style="font-family:Georgia, 'Times New Roman', serif; font-style:italic; font-size:24px; color:#2A1F17; letter-spacing:0.5px;"
                >
                  suhuf
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px;" align="center">
                <div
                  style="height:1px; background-color:rgba(180,125,58,0.22); margin:20px 0;"
                ></div>
              </td>
            </tr>
            <tr>
              <td style="padding:4px 40px 0 40px;" align="center">
                <h1
                  style="margin:0; font-family:Georgia, 'Times New Roman', serif; font-weight:normal; font-size:22px; color:#2A1F17;"
                >
                  Confirm your email
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding:12px 40px 0 40px;" align="center">
                <p
                  style="margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:15px; line-height:22px; color:#6B5B4A;"
                >
                  Enter this code to finish signing in to Suhuf.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 40px 0 40px;" align="center">
                <div
                  style="background-color:#F5EEE4; border:1px solid rgba(180,125,58,0.20); border-radius:10px; padding:20px 24px;"
                >
                  <span
                    style="font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace; font-size:34px; font-weight:600; letter-spacing:10px; color:#2A1F17;"
                    >{{ .Token }}</span
                  >
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 40px 40px 40px;" align="center">
                <p
                  style="margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:13px; line-height:20px; color:#8E7E6C;"
                >
                  This code expires in 1 hour. If you didn’t try to sign in, you
                  can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="max-width:480px;"
          >
            <tr>
              <td style="padding:20px 40px 0 40px;" align="center">
                <p
                  style="margin:0; font-family:Georgia, 'Times New Roman', serif; font-style:italic; font-size:13px; color:#A89A86;"
                >
                  suhuf — your Arabic readalong companion
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
